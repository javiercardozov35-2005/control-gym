<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUEENFIT Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 📚 Librería Oficial de Supabase Cloud -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00e676;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 40px;
            padding-bottom: 80px;
        }
        h2, h3 { margin-bottom: 15px; }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input, button, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input, select { background: #2a2a2a; color: #fff; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .cliente-item {
            border-bottom: 1px solid #333;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vencer { color: #ff5252; font-weight: bold; }
        .ok { color: var(--accent); }
        .btn-wa {
            background: #25d366;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-renovar {
            background: #00b0ff;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            width: auto;
            margin: 0;
            margin-left: 3px;
        }
        .btn-editar {
            background: #ffb300;
            color: black;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            width: auto;
            margin: 0;
            margin-left: 3px;
        }
        .btn-perfil {
            background: #9c27b0;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            width: auto;
            margin: 0;
            margin-left: 3px;
        }
        #status-cloud {
            text-align: center;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        #pantalla-bloqueo {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }
        .tab-button {
            background: none;
            color: var(--text-dim);
            border: none;
            font-size: 12px;
            font-weight: normal;
            padding: 5px;
            margin: 0;
            width: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tab-button.active {
            color: var(--accent);
            font-weight: bold;
        }
        .tab-icon { font-size: 20px; margin-bottom: 3px; }
        
        .search-box {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }
        
        .historial-item {
            border-bottom: 1px solid #2d2d2d;
            padding: 10px 0;
            font-size: 14px;
        }
        
        .grid-fechas {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .grid-fechas div { flex: 1; }
        .grid-fechas label { font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO + RECUPERACIÓN -->
    <div id="pantalla-bloqueo">
        <h2 style="text-align: center;">🔒 Acceso Restringido</h2>
        <p style="color: var(--text-dim); text-align: center; margin-bottom: 20px;">Ingresa la contraseña para gestionar LA SALA.</p>
        <input type="password" id="pass-input" placeholder="Contraseña de acceso" style="text-align: center; max-width: 300px;">
        <button onclick="verificarAcceso()" style="max-width: 300px; margin-top: 15px;">Entrar</button>
        <p id="error-msg" style="color: #ff5252; margin-top: 10px; display: none;">❌ Contraseña incorrecta</p>
        <span onclick="recuperarClave()" style="color: var(--accent); font-size: 13px; margin-top: 25px; cursor: pointer; text-decoration: underline;">¿Olvidaste la contraseña?</span>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="contenido-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🏋️‍♂️ QUEENFIT Pro</h2>
            <div style="display: flex; gap: 8px;">
                <button onclick="cargarDatosDesdeNube()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #333; color: #fff;">🔄 Sincronizar</button>
                <button onclick="cerrarSesion()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #ff5252; color: #fff;">🔒 Salir</button>
            </div>
        </div>
        
        <div id="status-cloud">Conectando...</div>

        <!-- PESTAÑA GESTIÓN -->
        <div id="tab-clientas" class="tab-content active">
            <div class="card">
                <h3 id="form-titulo">Registrar Miembro</h3>
                <input type="text" id="nombre" placeholder="Nombre Completo">
                <input type="tel" id="telefono" placeholder="Teléfono celular (Único)">
                <input type="number" id="valorMembresia" placeholder="Valor Mensualidad $ (Defecto: 70000)">
                <input type="date" id="fechaVence">
                <button id="btn-guardar" onclick="guardarCliente()">Guardar y Sincronizar</button>
                <button id="btn-cancelar" onclick="cancelarEdicion()" style="background:#555; color:#fff; display:none; margin-top: 5px;">Cancelar Edición</button>
            </div>

            <div class="card">
                <h3>Estado de Membresías</h3>
                <!-- Buscador mejorado por Nombre o Celular -->
                <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar por nombre o celular..." onkeyup="filtrarClientes()">
                <div id="listaClientes"></div>
            </div>
        </div>

        <!-- PESTAÑA HISTORIAL Y FINANZAS -->
        <div id="tab-historial" class="tab-content">
            <!-- 📊 PANEL DE PRODUCCIÓN MENSUAL -->
            <div class="card" style="border: 1px solid #333;">
                <h3>📊 Cierre de Caja e Ingresos</h3>
                <div class="grid-fechas">
                    <div>
                        <label>Desde:</label>
                        <input type="date" id="filtro-desde">
                    </div>
                    <div>
                        <label>Hasta:</label>
                        <input type="date" id="filtro-hasta">
                    </div>
                </div>
                <button onclick="calcularFinanzas()" style="background: #00b0ff; color: #fff; padding: 10px;">📊 Calcular Producción del Periodo</button>
                <div id="reporte-financiero" style="margin-top: 12px; font-size: 14px; line-height: 1.5; color: var(--accent);"></div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="titulo-historial">📜 Registro Histórico Global</h3>
                    <button id="btn-ver-todos-historial" onclick="verHistorialGlobal()" style="display:none; width:auto; padding:4px 10px; font-size:11px; background:#444; color:#fff;">Ver Todos</button>
                </div>
                <div id="listaHistorial"></div>
            </div>
        </div>

        <!-- BARRA INFERIOR -->
        <div class="tab-bar">
            <button class="tab-button active" onclick="cambiarPestaña('tab-clientas', this)">
                <span class="tab-icon">👥</span>Clientas
            </button>
            <button class="tab-button" onclick="cambiarPestaña('tab-historial', this)">
                <span class="tab-icon">📜</span>Historial
            </button>
        </div>
    </div>

    <script>
        const CLAVE_ACCESO = "1876"; 
        const PALABRA_SECRETA = "majo"; 
        const VALOR_POR_DEFECTO = 70000; 
        
        const SUPABASE_URL = "https://hvinbsrtwllpdppgxdpw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_aLuAKNoFHcKZvb9jq2mAXw_8Ioa-vQJ";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let clientes = [];
        let historialPagos = [];
        let editandoId = null;

        if (sessionStorage.getItem('auth_gym_nube') === 'true') {
            mostrarApp();
        }

        function verificarAcceso() {
            const campoClave = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('error-msg');
            if (campoClave === CLAVE_ACCESO) {
                sessionStorage.setItem('auth_gym_nube', 'true');
                mostrarApp();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pass-input').value = '';
            }
        }

        function recuperarClave() {
            const respuesta = prompt("🔑 Recuperación: ¿Cuál es tu nombre de pila o palabra secreta de cosmiatría?").toLowerCase().trim();
            if (respuesta === PALABRA_SECRETA) {
                alert(`🔓 ¡Validación Exitosa! Tu contraseña de acceso a LA SALA es: ${CLAVE_ACCESO}`);
            } else {
                alert("❌ Respuesta incorrecta. No se puede revelar la clave.");
            }
        }

        function mostrarApp() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('contenido-app').style.display = 'block';
            establecerFechaDefecto();
            establecerFechasFiltroDefecto();
            cargarDatosDesdeNube();
        }

        function cerrarSesion() {
            sessionStorage.removeItem('auth_gym_nube');
            window.location.reload();
        }

        function cambiarPestaña(tabId, boton) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            boton.classList.add('active');
            
            if (tabId === 'tab-historial') {
                renderizarHistorial();
            }
        }

        function establecerFechaDefecto() {
            const hoy = new Date();
            hoy.setMonth(hoy.getMonth() + 1);
            document.getElementById('fechaVence').value = hoy.toISOString().split('T')[0];
        }

        function establecerFechasFiltroDefecto() {
            const hoy = new Date();
            const anio = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0'); // Ajusta el mes actual correctamente
            
            // Obtener el último día del mes actual de forma exacta
            const ultimoDiaMes = new Date(anio, hoy.getMonth() + 1, 0).getDate();
            
            document.getElementById('filtro-desde').value = `${anio}-${mes}-01`;
            document.getElementById('filtro-hasta').value = `${anio}-${mes}-${String(ultimoDiaMes).padStart(2, '0')}`;
        }

        function formatearMoneda(valor) {
            if (!valor) return "$0";
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(valor);
        }

        async function cargarDatosDesdeNube() {
            document.getElementById('status-cloud').innerText = "🔄 Sincronizando con Supabase Central...";
            try {
                const resClientes = await _supabase.from('clientes').select('*').order('nombre', { ascending: true });
                if (resClientes.error) throw resClientes.error;
                clientes = resClientes.data || [];

                const resHistorial = await _supabase.from('historial').select('*').order('id', { ascending: false });
                if (resHistorial.error) throw resHistorial.error;
                historialPagos = resHistorial.data || [];

                document.getElementById('status-cloud').innerText = "Base de Datos QUEENFIT Online";
                renderizarClientes();
                renderizarHistorial();
            } catch (error) {
                console.error(error);
                document.getElementById('status-cloud').innerText = "❌ Error en Nube. Verifica tus llaves API.";
            }
        }

        async function guardarCliente() {
            const nombreInput = document.getElementById('nombre');
            const telefonoInput = document.getElementById('telefono');
            const valorInput = document.getElementById('valorMembresia');
            const fechaInput = document.getElementById('fechaVence');

            const nombre = nombreInput.value.trim();
            const telefono = telefonoInput.value.trim().replace(/\s+/g, ''); // Remover espacios internos
            let valorMembresia = valorInput.value.trim();
            if (!valorMembresia) valorMembresia = VALOR_POR_DEFECTO.toString();
            const fechaVence = fechaInput.value;

            if (!nombre || !telefono || !fechaVence) {
                alert('Por favor llena los campos obligatorios (Nombre, Celéfono y Fecha)');
                return;
            }

            document.getElementById('status-cloud').innerText = "🚀 Procesando petición...";

            try {
                if (editandoId === null) {
                    // 🛡️ CONTROL ROBUSTO ANTI-HOMÓNIMOS (Por Celular único)
                    const celDuplicado = clientes.some(c => c.telefono === telefono);
                    if (celDuplicado) {
                        alert(`❌ ERROR DE REGISTRO:\nEl número celular "${telefono}" ya pertenece a otra alumna activa.\nNo puedes duplicar números de contacto en el sistema.`);
                        document.getElementById('status-cloud').innerText = "Base de Datos QUEENFIT Online";
                        return;
                    }

                    const { error } = await _supabase.from('clientes').insert([{ nombre, telefono, fechaVence, valorMembresia }]);
                    if (error) throw error;

                    const fechaHoy = new Date().toISOString().split('T')[0];
                    await _supabase.from('historial').insert([{ 
                        nombre, 
                        fechaPago: fechaHoy, 
                        concepto: `✨ INSCRIPCIÓN: Celular ${telefono} - Alta con Tarifa de ${formatearMoneda(valorMembresia)} (Monto: $0)` 
                    }]);
                    
                    alert('¡Clienta registrada con éxito!');
                } else {
                    // MODO EDICIÓN
                    const { error } = await _supabase.from('clientes').update({ nombre, telefono, fechaVence, valorMembresia }).eq('id', editandoId);
                    if (error) throw error;

                    const fechaHoy = new Date().toISOString().split('T')[0];
                    await _supabase.from('historial').insert([{ 
                        nombre, 
                        fechaPago: fechaHoy, 
                        concepto: `✏️ EDICIÓN: Parámetros actualizados. Celular: ${telefono} - Tarifa: ${formatearMoneda(valorMembresia)}` 
                    }]);
                    
                    alert('¡Perfil modificado con éxito!');
                    cancelarEdicion();
                }

                nombreInput.value = '';
                telefonoInput.value = '';
                valorInput.value = '';
                establecerFechaDefecto();
                cargarDatosDesdeNube();
            } catch (error) {
                alert("Error al guardar: " + error.message);
            }
        }

        function iniciarEdicion(index) {
            const cliente = clientes[index];
            editandoId = cliente.id;

            document.getElementById('nombre').value = cliente.nombre;
            document.getElementById('telefono').value = cliente.telefono;
            document.getElementById('valorMembresia').value = cliente.valorMembresia || "";
            document.getElementById('fechaVence').value = cliente.fechaVence;

            document.getElementById('form-titulo').innerText = "✏️ Editar Datos de: " + cliente.nombre;
            document.getElementById('btn-guardar').innerText = "Actualizar Clienta";
            document.getElementById('btn-cancelar').style.display = "block";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            editandoId = null;
            document.getElementById('nombre').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('valorMembresia').value = '';
            establecerFechaDefecto();

            document.getElementById('form-titulo').innerText = "Registrar Miembro";
            document.getElementById('btn-guardar').innerText = "Guardar y Sincronizar";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        async function renovarMembresia(index) {
            const cliente = clientes[index];
            const precioMensual = parseInt(cliente.valorMembresia) || VALOR_POR_DEFECTO;

            const mesesAPagarStr = prompt(`💵 REGISTRAR ABONO: ${cliente.nombre}\n¿Cuántos meses va a cancelar hoy?`, "1");
            if (mesesAPagarStr === null) return; 
            const meses = parseInt(mesesAPagarStr) || 1;

            const fechaHoyStr = new Date().toISOString().split('T')[0];
            const fechaPagoReal = prompt(`📅 Ingrese la FECHA REAL del cobro (Año-Mes-Día):`, fechaHoyStr);
            if (fechaPagoReal === null) return;

            const metodoInput = prompt(`💳 Método de pago:\n1 - Transferencia\n2 - Efectivo`, "1");
            if (metodoInput === null) return;
            const metodoTexto = (metodoInput.trim() === "2") ? "Efectivo" : "Transferencia";

            let fechaBase = new Date(cliente.fechaVence + 'T00:00:00');
            const hoy = new Date();
            
            if (fechaBase < hoy) {
                fechaBase = hoy;
            }
            
            fechaBase.setMonth(fechaBase.getMonth() + meses);
            const nuevaFechaStr = fechaBase.toISOString().split('T')[0];
            const totalRecibido = precioMensual * meses;
            
            document.getElementById('status-cloud').innerText = "⏳ Inyectando abono financiero en la nube...";

            try {
                const { error } = await _supabase.from('clientes').update({ fechaVence: nuevaFechaStr, valorMembresia: precioMensual.toString() }).eq('id', cliente.id);
                if (error) throw error;

                // 🌟 IMPORTANTE: Guardamos la etiqueta [Monto: X] y (Medio) estructurado para que el calculador financiero de abajo los pueda leer y sumar
                await _supabase.from('historial').insert([{
                    nombre: cliente.nombre,
                    fechaPago: fechaPagoReal,
                    concepto: `💵 PAGO MENSUALIDAD: [Monto: ${totalRecibido}] (${metodoTexto}) por ${meses} Mes(es). Vence: ${nuevaFechaStr}`
                }]);

                alert(`✅ ¡Abono Exitoso!\n${cliente.nombre} al día.\nTotal: ${formatearMoneda(totalRecibido)} via ${metodoTexto}.`);
                cargarDatosDesdeNube();
            } catch (error) {
                alert("No se pudo procesar: " + error.message);
            }
        }

        // 🔍 CONSULTAR HISTORIAL INDIVIDUAL DE UNA SOLA CLIENTA
        function verHistorialAlumna(nombreAlumna) {
            cambiarPestaña('tab-historial', document.querySelectorAll('.tab-button')[1]);
            document.getElementById('titulo-historial').innerText = `📜 Pagos de: ${nombreAlumna}`;
            document.getElementById('btn-ver-todos-historial').style.display = "block";

            const contenedor = document.getElementById('listaHistorial');
            contenedor.innerHTML = '';

            const filtrados = historialPagos.filter(h => h.nombre.toLowerCase() === nombreAlumna.toLowerCase());

            if (filtrados.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">No hay movimientos registrados para esta alumna.</p>';
                return;
            }

            filtrados.forEach((h) => {
                contenedor.innerHTML += `
                    <div class="historial-item">
                        <span style="color:var(--accent); font-weight:bold;">📅 Recibido: ${h.fechaPago}</span><br>
                        <span style="color:var(--text); font-size:13px;">${h.concepto}</span>
                    </div>
                `;
            });
        }

        function verHistorialGlobal() {
            document.getElementById('titulo-historial').innerText = "📜 Registro Histórico Global";
            document.getElementById('btn-ver-todos-historial').style.display = "none";
            renderizarHistorial();
        }

        // 📊 MOTOR FINANCIERO: RECORRE LA NUBE Y EFECTÚA EL CIERRE DE CAJA
        function calcularFinanzas() {
            const desde = document.getElementById('filtro-desde').value;
            const hasta = document.getElementById('filtro-hasta').value;
            const reporteDiv = document.getElementById('reporte-financiero');

            if (!desde || !hasta) {
                alert("Por favor selecciona ambas fechas para el reporte.");
                return;
            }

            let totalAcumulado = 0;
            let totalTransferencias = 0;
            let totalEfectivo = 0;
            let transaccionesContadas = 0;

            historialPagos.forEach(h => {
                // Filtramos si la fecha del pago está dentro del rango
                if (h.fechaPago >= desde && h.fechaPago <= hasta) {
                    // Buscamos la etiqueta oculta [Monto: X] dentro del concepto del pago
                    const coincidenciaMonto = h.concepto.match(/\[Monto:\s*(\d+)\]/);
                    
                    if (coincidenciaMonto) {
                        const monto = parseInt(coincidenciaMonto[1]) || 0;
                        totalAcumulado += monto;
                        transaccionesContadas++;

                        // Identificamos el medio de pago
                        if (h.concepto.includes("(Efectivo)")) {
                            totalEfectivo += monto;
                        } else {
                            totalTransferencias += monto;
                        }
                    }
                }
            });

            reporteDiv.innerHTML = `
                <div style="background:#2a2a2a; padding:12px; border-radius:8px; border-left:4px solid #00b0ff;">
                    <strong>Periodo:</strong> ${desde} hasta ${hasta}<br>
                    <strong>Abonos procesados:</strong> ${transaccionesContadas}<br><br>
                    <span style="font-size:16px; color:#fff;">💰 Total Neto Producido: <strong style="color:var(--accent);">${formatearMoneda(totalAcumulado)}</strong></span><br>
                    <span style="color:#00b0ff;">💳 Por Transferencia: ${formatearMoneda(totalTransferencias)}</span><br>
                    <span style="color:#ffb300;">💵 En Efectivo: ${formatearMoneda(totalEfectivo)}</span>
                </div>
            `;
        }

        // FILTRADO DINÁMICO POR NOMBRE O POR CELULAR
        function filtrarClientes() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const items = document.getElementsByClassName('cliente-item');
            
            for (let i = 0; i < items.length; i++) {
                const nombreCliente = items[i].getAttribute('data-nombre').toLowerCase();
                const celularCliente = items[i].getAttribute('data-celular');
                
                if (nombreCliente.includes(textoBusqueda) || celularCliente.includes(textoBusqueda)) {
                    items[i].style.display = 'flex';
                } else {
                    items[i].style.display = 'none';
                }
            }
        }

        function renderizarClientes() {
            const contenedor = document.getElementById('listaClientes');
            contenedor.innerHTML = '';

            if (clientes.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">No hay clientas en la base de datos.</p>';
                return;
            }

            const hoyMs = new Date().setHours(0,0,0,0);

            clientes.forEach((c, index) => {
                const fVence = new Date(c.fechaVence + 'T00:00:00');
                const diffTiempo = fVence - hoyMs;
                const diasRestantes = Math.ceil(diffTiempo / (1000 * 60 * 60 * 24));
                const precioMensual = parseInt(c.valorMembresia) || VALOR_POR_DEFECTO;

                let claseEstado = "ok";
                let textoEstado = `${diasRestantes} días restantes`;
                let plantillaMensaje = "";
                
                if (diasRestantes > 0) {
                    claseEstado = "ok";
                    plantillaMensaje = `Hola ${c.nombre}, Apreciamos mucho que seas parte de esta familia QUEENFIT, te escribimos brevemente para recordarte que tu mensualidad de entreno vence el ${c.fechaVence}. Sabemos que el dia a dia es una locura y a veces nos pasa no te preocupes🥰, puedes realizar tus pagos en la llave @3104439749 cualquier duda que tengas estamos a un mensaje de distacia!!! Si ya pagaste omite el mensaje... ¡Te esperamos para seguir entrenando!`;
                } else {
                    claseEstado = "vencer";
                    const diasVencidos = Math.abs(diasRestantes);
                    
                    if (diasVencidos <= 30) {
                        textoEstado = `Vencido hace ${diasVencidos} días (Debe: ${formatearMoneda(precioMensual)})`;
                        plantillaMensaje = `Hola ${c.nombre}, esperamos que estés muy bien. Te escribimos de parte de la familia QUEENFIT para recordarte que tu mensualidad de entreno ya se encuentra vencida desde el pasado ${c.fechaVence} (hace ${diasVencidos} días), presentando un saldo pendiente de ${formatearMoneda(precioMensual)}. Te invitamos a ponerte al día en la llave @3104439749 para continuar con toda la energía en tus entrenamientos. Si ya realizaste tu pago, por favor omite este mensaje 🥰. ¡Te esperamos en la sala!`;
                    } else {
                        const mesesDeuda = Math.floor(diasVencidos / 30);
                        const deudaTotalCalculada = precioMensual * mesesDeuda;
                        textoEstado = `⚠️ Mora: ${mesesDeuda} Meses (Debe: ${formatearMoneda(deudaTotalCalculada)})`;
                        plantillaMensaje = `Hola ${c.nombre}, de parte de la familia QUEENFIT nos comunicamos contigo porque registramos en el sistema que tu membresía venció desde el pasado ${c.fechaVence} y presentas un saldo pendiente acumulado de aproximadamente ${mesesDeuda} meses de entreno, correspondiente a un total de ${formatearMoneda(deudaTotalCalculada)}. Queremos invitarte a que te pongas al día mediante nuestra llave de pagos @3104439749 o te acerques para validar tu estado. Si ya cancelaste o tienes alguna duda, escríbenos con confianza 🥰. ¡Queremos seguir acompañándote en tus metas!`;
                    }
                }

                const mensajeEncoded = encodeURIComponent(plantillaMensaje);
                const urlWa = `https://wa.me/${c.telefono}?text=${mensajeEncoded}`;

                // Inyectamos atributos de búsqueda por celular y nombre
                contenedor.innerHTML += `
                    <div class="cliente-item" data-nombre="${c.nombre}" data-celular="${c.telefono}">
                        <div style="max-width: 45%;">
                            <strong>${c.nombre}</strong><br>
                            <span style="font-size:12px; color:var(--text-dim)">📱 ${c.telefono}</span><br>
                            <span class="${claseEstado}" style="font-size:13px;">${textoEstado}</span>
                        </div>
                        <div style="display:flex; align-items:center; flex-wrap: wrap; justify-content: flex-end; gap: 4px;">
                            <a href="${urlWa}" class="btn-wa" target="_blank">📱</a>
                            <button class="btn-renovar" onclick="renovarMembresia(${index})">💵 Pagar</button>
                            <button class="btn-perfil" onclick="verHistorialAlumna('${c.nombre}')">🔍</button>
                            <button class="btn-editar" onclick="iniciarEdicion(${index})">✏️</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderizarHistorial() {
            const contenedor = document.getElementById('listaHistorial');
            contenedor.innerHTML = '';

            if (historialPagos.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">Aún no hay registros de pagos en la nube.</p>';
                return;
            }

            historialPagos.forEach((h) => {
                contenedor.innerHTML += `
                    <div class="historial-item">
                        <span style="color:var(--accent); font-weight:bold;">📅 Fecha: ${h.fechaPago}</span> - 
                        <strong>${h.nombre}</strong><br>
                        <span style="color:var(--text-dim); font-size:13px;">${h.concepto}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
