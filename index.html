<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gym Control Nube Seguro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00e676;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 40px;
        }
        h2, h3 { margin-bottom: 15px; }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input { background: #2a2a2a; color: #fff; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .cliente-item {
            border-bottom: 1px solid #333;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vencer { color: #ff5252; font-weight: bold; }
        .ok { color: var(--accent); }
        .btn-wa {
            background: #25d366;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        #status-cloud {
            text-align: center;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        
        /* Estilos Pantalla de Bloqueo */
        #pantalla-bloqueo {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        #contenido-app { display: none; }
    </style>
</head>
<body>

    <!-- 1. PANTALLA DE ACCESO SEGURO -->
    <div id="pantalla-bloqueo">
        <h2 style="text-align: center;">🔒 Acceso Restringido</h2>
        <p style="color: var(--text-dim); text-align: center; margin-bottom: 20px;">Ingresa la contraseña para gestionar LA SALA.</p>
        <input type="password" id="pass-input" placeholder="Contraseña de acceso" style="text-align: center; max-width: 300px;">
        <button onclick="verificarAcceso()" style="max-width: 300px; margin-top: 15px;">Entrar</button>
        <p id="error-msg" style="color: #ff5252; margin-top: 10px; display: none;">❌ Contraseña incorrecta</p>
    </div>

    <!-- 2. CONTENIDO PRINCIPAL DE LA APP (OCULTO POR DEFECTO) -->
    <div id="contenido-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🏋️‍♂️ QUEENFIT Nube</h2>
            <div style="display: flex; gap: 8px;">
                <button onclick="cargarDatosDesdeNube()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #333; color: #fff;">🔄 Sincronizar</button>
                <button onclick="cerrarSesion()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #ff5252; color: #fff;">🔒 Salir</button>
            </div>
        </div>
        
        <div id="status-cloud">Conectado a tu base de datos central</div>

        <div class="card">
            <h3>Registrar Miembro</h3>
            <input type="text" id="nombre" placeholder="Nombre Completo">
            <input type="tel" id="telefono" placeholder="Teléfono (ej: 573001234567)">
            <input type="date" id="fechaVence">
            <button onclick="guardarCliente()">Guardar y Sincronizar</button>
        </div>

        <div class="card">
            <h3>Estado de Membresías</h3>
            <div id="listaClientas"></div>
        </div>
    </div>

    <script>
        // 🔑 CONFIGURACIÓN DE SEGURIDAD (Cambia '1234' por tu contraseña secreta)
        const CLAVE_ACCESO = "1876"; 

        // 🔑 CREDENCIALES DE TU NUBE EN GITHUB (Vuelve a pegar tus códigos aquí)
        const GITHUB_TOKEN = "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";
           const GIST_ID = "21365845c798d69c70fb66ca12ab5691";

        let clientes = [];

        // --- LÓGICA DE CONTROL DE ACCESO ---
        if (sessionStorage.getItem('auth_gym_nube') === 'true') {
            mostrarApp();
        }

        function verificarAcceso() {
            const campoClave = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('error-msg');

            if (campoClave === CLAVE_ACCESO) {
                sessionStorage.setItem('auth_gym_nube', 'true');
                mostrarApp();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pass-input').value = '';
            }
        }

        function mostrarApp() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('contenido-app').style.display = 'block';
            establecerFechaDefecto();
            cargarDatosDesdeNube(); // Descarga los datos de internet solo tras poner la clave
        }

        function cerrarSesion() {
            sessionStorage.removeItem('auth_gym_nube');
            window.location.reload();
        }

        // --- LÓGICA DE LA APLICACIÓN ---
        function establecerFechaDefecto() {
            const hoy = new Date();
            hoy.setMonth(hoy.getMonth() + 1);
            document.getElementById('fechaVence').value = hoy.toISOString().split('T')[0];
        }

        async function cargarDatosDesdeNube() {
            document.getElementById('status-cloud').innerText = "🔄 Sincronizando con la nube...";
            try {
                const respuesta = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });
                const datos = await respuesta.json();
                const contenidoTexto = datos.files["gym_clientes.json"].content;
                clientes = JSON.parse(contenidoTexto);
                document.getElementById('status-cloud').innerText = "✅ Datos actualizados de la nube";
                renderizarClientes();
            } catch (error) {
                document.getElementById('status-cloud').innerText = "❌ Error al conectar. Usando copia local.";
                clientes = JSON.parse(localStorage.getItem('gym_backup')) || [];
                renderizarClientes();
            }
        }

        async function guardarCliente() {
            const nombreInput = document.getElementById('nombre');
            const telefonoInput = document.getElementById('telefono');
            const fechaInput = document.getElementById('fechaVence');

            const nombre = nombreInput.value;
            const telefono = telefonoInput.value;
            const fechaVence = fechaInput.value;

            if (!nombre || !telefono || !fechaVence) {
                alert('Por favor llena todos los campos');
                return;
            }

            clientes.push({ nombre, telefono, fechaVence });
            localStorage.setItem('gym_backup', JSON.stringify(clientes));
            document.getElementById('status-cloud').innerText = "🚀 Subiendo datos a la nube...";

            try {
                await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        headers: { "Authorization": "token " + GITHUB_TOKEN },
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        files: {
                            "gym_clientes.json": { content: JSON.stringify(clientes, null, 2) }
                        }
                    })
                });
                
                nombreInput.value = '';
                telefonoInput.value = '';
                establecerFechaDefecto();
                document.getElementById('status-cloud').innerText = "✅ ¡Sincronizado en la nube con éxito!";
                renderizarClientes();
            } catch (error) {
                alert("Guardado localmente, pero falló la sincronización web.");
            }
        }

        function renderizarClientes() {
            const contenedor = document.getElementById('listaClientes');
            contenedor.innerHTML = '';

            if (clientes.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">No hay clientes registrados.</p>';
                return;
            }

            const hoyMs = new Date().setHours(0,0,0,0);

            clientes.forEach((c) => {
                const fVence = new Date(c.fechaVence + 'T00:00:00');
                const diffTiempo = fVence - hoyMs;
                const diasRestantes = Math.ceil(diffTiempo / (1000 * 60 * 60 * 24));

                let claseEstado = "ok";
                let textoEstado = `${diasRestantes} días restantes`;

                if (diasRestantes <= 0) {
                    claseEstado = "vencer";
                    textoEstado = "Vencido";
                } else if (diasRestantes <= 3) {
                    claseEstado = "vencer";
                    textoEstado = `¡Vence en ${diasRestantes} días!`;
                }

                const mensaje = encodeURIComponent(`Hola ${c.nombre}, Apreciamos mucho que seas parte de esta familia QUEENFIT, te escribimos brevemente para recordarte que tu mensualidad de entreno vence el ${c.fechaVence}. Sabemos que el dia a dia es una locura y a veces nos pasa no te preocupes🥰, puedes realizar tus pagos en la llave @3104439749 cualquier duda que tengas estamos a un mensaje de distacia!!!  Si ya pagaste omite el mensaje... ¡Te esperamos para seguir entrenando!`);
                const urlWa = `https://wa.me/${c.telefono}?text=${mensaje}`;

                contenedor.innerHTML += `
                    <div class="cliente-item">
                        <div>
                            <strong>${c.nombre}</strong><br>
                            <span class="${claseEstado}">${textoEstado}</span>
                        </div>
                        <div>
                            <a href="${urlWa}" class="btn-wa" target="_blank">📱 Avisar</a>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
