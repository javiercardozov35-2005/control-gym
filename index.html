<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>QUEENFIT Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 📚 Librería Oficial de Supabase Cloud -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #00e676;
            --text: #ffffff;
            --text-dim: #aaaaaa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-top: 40px;
            padding-bottom: 80px;
        }
        h2, h3 { margin-bottom: 15px; }
        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        input { background: #2a2a2a; color: #fff; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .cliente-item {
            border-bottom: 1px solid #333;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vencer { color: #ff5252; font-weight: bold; }
        .ok { color: var(--accent); }
        .btn-wa {
            background: #25d366;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
        .btn-renovar {
            background: #00b0ff;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            width: auto;
            margin: 0;
            margin-left: 5px;
        }
        .btn-editar {
            background: #ffb300;
            color: black;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            width: auto;
            margin: 0;
            margin-left: 5px;
        }
        #status-cloud {
            text-align: center;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 10px;
        }
        #pantalla-bloqueo {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 65px;
            background: #1a1a1a;
            border-top: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
        }
        .tab-button {
            background: none;
            color: var(--text-dim);
            border: none;
            font-size: 12px;
            font-weight: normal;
            padding: 5px;
            margin: 0;
            width: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tab-button.active {
            color: var(--accent);
            font-weight: bold;
        }
        .tab-icon { font-size: 20px; margin-bottom: 3px; }
        
        .search-box {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }
        
        .historial-item {
            border-bottom: 1px solid #2d2d2d;
            padding: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE ACCESO -->
    <div id="pantalla-bloqueo">
        <h2 style="text-align: center;">🔒 Acceso Restringido</h2>
        <p style="color: var(--text-dim); text-align: center; margin-bottom: 20px;">Ingresa la contraseña para gestionar LA SALA.</p>
        <input type="password" id="pass-input" placeholder="Contraseña de acceso" style="text-align: center; max-width: 300px;">
        <button onclick="verificarAcceso()" style="max-width: 300px; margin-top: 15px;">Entrar</button>
        <p id="error-msg" style="color: #ff5252; margin-top: 10px; display: none;">❌ Contraseña incorrecta</p>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="contenido-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🏋️‍♂️ QUEENFIT Pro</h2>
            <div style="display: flex; gap: 8px;">
                <button onclick="cargarDatosDesdeNube()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #333; color: #fff;">🔄 Sincronizar</button>
                <button onclick="cerrarSesion()" style="width: auto; padding: 6px 12px; font-size: 12px; background: #ff5252; color: #fff;">🔒 Salir</button>
            </div>
        </div>
        
        <div id="status-cloud">Conectando...</div>

        <!-- PESTAÑA GESTIÓN -->
        <div id="tab-clientas" class="tab-content active">
            <div class="card">
                <h3 id="form-titulo">Registrar Miembro</h3>
                <input type="text" id="nombre" placeholder="Nombre Completo">
                <input type="tel" id="telefono" placeholder="Teléfono (ej: 573001234567)">
                <input type="date" id="fechaVence">
                <button id="btn-guardar" onclick="guardarCliente()">Guardar y Sincronizar</button>
                <button id="btn-cancelar" onclick="cancelarEdicion()" style="background:#555; color:#fff; display:none; margin-top: 5px;">Cancelar Edición</button>
            </div>

            <div class="card">
                <h3>Estado de Membresías</h3>
                <input type="text" id="buscador" class="search-box" placeholder="🔍 Buscar alumna por nombre..." onkeyup="filtrarClientes()">
                <div id="listaClientes"></div>
            </div>
        </div>

        <!-- PESTAÑA HISTORIAL -->
        <div id="tab-historial" class="tab-content">
            <div class="card">
                <h3>📜 Registro Histórico de Pagos</h3>
                <p style="color: var(--text-dim); font-size: 12px;">Aquí se guardan las renovaciones de mensualidad de forma permanente.</p>
                <div id="listaHistorial"></div>
            </div>
        </div>

        <!-- BARRA INFERIOR -->
        <div class="tab-bar">
            <button class="tab-button active" onclick="cambiarPestaña('tab-clientas', this)">
                <span class="tab-icon">👥</span>Clientas
            </button>
            <button class="tab-button" onclick="cambiarPestaña('tab-historial', this)">
                <span class="tab-icon">📜</span>Historial
            </button>
        </div>
    </div>

    <script>
        const CLAVE_ACCESO = "1876"; 
        
        // 🔑 REEMPLAZA ESTAS DOS LÍNEAS CON TUS DATOS REALES DE SUPABASE (Paso 3)
        const SUPABASE_URL = "https://hvinbsrtwllpdppgxdpw.supabase.co/rest/v1/";
        const SUPABASE_ANON_KEY = "sb_publishable_aLuAKNoFHcKZvb9jq2mAXw_8Ioa-vQJ";

        // Inicializar el cliente de Supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let clientes = [];
        let historialPagos = [];
        let editandoId = null; // Guardamos el ID real de la base de datos

        if (sessionStorage.getItem('auth_gym_nube') === 'true') {
            mostrarApp();
        }

        function verificarAcceso() {
            const campoClave = document.getElementById('pass-input').value;
            const errorMsg = document.getElementById('error-msg');
            if (campoClave === CLAVE_ACCESO) {
                sessionStorage.setItem('auth_gym_nube', 'true');
                mostrarApp();
            } else {
                errorMsg.style.display = 'block';
                document.getElementById('pass-input').value = '';
            }
        }

        function mostrarApp() {
            document.getElementById('pantalla-bloqueo').style.display = 'none';
            document.getElementById('contenido-app').style.display = 'block';
            establecerFechaDefecto();
            cargarDatosDesdeNube();
        }

        function cerrarSesion() {
            sessionStorage.removeItem('auth_gym_nube');
            window.location.reload();
        }

        function cambiarPestaña(tabId, boton) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            boton.classList.add('active');
        }

        function establecerFechaDefecto() {
            const hoy = new Date();
            hoy.setMonth(hoy.getMonth() + 1);
            document.getElementById('fechaVence').value = hoy.toISOString().split('T')[0];
        }

        // DESCARGAR DATOS DESDE SUPABASE REAL CLOUD
        async function cargarDatosDesdeNube() {
            document.getElementById('status-cloud').innerText = "🔄 Sincronizando con Supabase Central...";
            try {
                // 1. Cargar Clientas
                const resClientes = await _supabase.from('clientes').select('*').order('nombre', { ascending: true });
                if (resClientes.error) throw resClientes.error;
                clientes = resClientes.data || [];

                // 2. Cargar Historial
                const resHistorial = await _supabase.from('historial').select('*').order('created_at', { ascending: false });
                if (resHistorial.error) throw resHistorial.error;
                historialPagos = resHistorial.data || [];

                document.getElementById('status-cloud').innerText = "✅ Base de Datos QUEENFIT Online";
                renderizarClientes();
                renderizarHistorial();
            } catch (error) {
                console.error(error);
                document.getElementById('status-cloud').innerText = "❌ Error en Nube. Verifica tus llaves API.";
            }
        }

        // GUARDAR O EDITAR EN SUPABASE
        async function guardarCliente() {
            const nombreInput = document.getElementById('nombre');
            const telefonoInput = document.getElementById('telefono');
            const fechaInput = document.getElementById('fechaVence');

            const nombre = nombreInput.value.trim();
            const telefono = telefonoInput.value.trim();
            const fechaVence = fechaInput.value;

            if (!nombre || !telefono || !fechaVence) {
                alert('Por favor llena todos los campos');
                return;
            }

            document.getElementById('status-cloud').innerText = "🚀 Guardando cambios en la nube...";

            try {
                if (editandoId === null) {
                    // CLIENTA NUEVA
                    const { error } = await _supabase.from('clientes').insert([{ nombre, telefono, fechaVence }]);
                    if (error) throw error;

                    const fechaHoy = new Date().toISOString().split('T')[0];
                    await _supabase.from('historial').insert([{ nombre, fechaPago: fechaHoy, concepto: "Inscripción / Nueva mensualidad" }]);
                    
                    alert('¡Clienta registrada permanentemente en la nube!');
                } else {
                    // EDITAR EXISTENTE
                    const { error } = await _supabase.from('clientes').update({ nombre, telefono, fechaVence }).eq('id', editandoId);
                    if (error) throw error;

                    const fechaHoy = new Date().toISOString().split('T')[0];
                    await _supabase.from('historial').insert([{ nombre, fechaPago: fechaHoy, concepto: "Datos de contacto actualizados" }]);
                    
                    alert('¡Datos actualizados con éxito!');
                    cancelarEdicion();
                }

                nombreInput.value = '';
                telefonoInput.value = '';
                establecerFechaDefecto();
                cargarDatosDesdeNube(); // Recarga la pantalla con los datos reales de internet
            } catch (error) {
                alert("Error al guardar en la base de datos: " + error.message);
            }
        }

        function iniciarEdicion(index) {
            const cliente = clientes[index];
            editandoId = cliente.id; // Guardamos el identificador numérico/uuid real

            document.getElementById('nombre').value = cliente.nombre;
            document.getElementById('telefono').value = cliente.telefono;
            document.getElementById('fechaVence').value = cliente.fechaVence;

            document.getElementById('form-titulo').innerText = "✏️ Editar Datos de: " + cliente.nombre;
            document.getElementById('btn-guardar').innerText = "Actualizar Clienta";
            document.getElementById('btn-cancelar').style.display = "block";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            editandoId = null;
            document.getElementById('nombre').value = '';
            document.getElementById('telefono').value = '';
            establecerFechaDefecto();

            document.getElementById('form-titulo').innerText = "Registrar Miembro";
            document.getElementById('btn-guardar').innerText = "Guardar y Sincronizar";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        // RENOVAR MENSUALIDAD DIRECTO EN LA NUBE
        async function renovarMembresia(index) {
            const cliente = clientes[index];
            const nuevaFecha = new Date();
            nuevaFecha.setMonth(nuevaFecha.getMonth() + 1);
            const nuevaFechaStr = nuevaFecha.toISOString().split('T')[0];
            
            document.getElementById('status-cloud').innerText = "⏳ Procesando renovación...";

            try {
                // Actualizar en Supabase
                const { error } = await _supabase.from('clientes').update({ fechaVence: nuevaFechaStr }).eq('id', cliente.id);
                if (error) throw error;

                // Añadir al Historial en Supabase
                const fechaHoy = new Date().toISOString().split('T')[0];
                await _supabase.from('historial').insert([{
                    nombre: cliente.nombre,
                    fechaPago: fechaHoy,
                    concepto: "Renovación mensualidad (Vence: " + nuevaFechaStr + ")"
                }]);

                alert('¡Mensualidad de ' + cliente.nombre + ' renovada!');
                cargarDatosDesdeNube();
            } catch (error) {
                alert("No se pudo renovar: " + error.message);
            }
        }

        function filtrarClientes() {
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();
            const items = document.getElementsByClassName('cliente-item');
            
            for (let i = 0; i < items.length; i++) {
                const nombreCliente = items[i].getAttribute('data-nombre').toLowerCase();
                if (nombreCliente.includes(textoBusqueda)) {
                    items[i].style.display = 'flex';
                } else {
                    items[i].style.display = 'none';
                }
            }
        }

        function renderizarClientes() {
            const contenedor = document.getElementById('listaClientes');
            contenedor.innerHTML = '';

            if (clientes.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">No hay clientas registradas en la base de datos.</p>';
                return;
            }

            const hoyMs = new Date().setHours(0,0,0,0);

            clientes.forEach((c, index) => {
                const fVence = new Date(c.fechaVence + 'T00:00:00');
                const diffTiempo = fVence - hoyMs;
                const diasRestantes = Math.ceil(diffTiempo / (1000 * 60 * 60 * 24));

                let claseEstado = "ok";
                let textoEstado = `${diasRestantes} días restantes`;

                if (diasRestantes <= 0) {
                    claseEstado = "vencer";
                    textoEstado = "Vencido";
                } else if (diasRestantes <= 3) {
                    claseEstado = "vencer";
                    textoEstado = `¡Vence en ${diasRestantes} días!`;
                }

                const mensaje = encodeURIComponent(`Hola ${c.nombre}, Apreciamos mucho que seas parte de esta familia QUEENFIT, te escribimos brevemente para recordarte que tu mensualidad de entreno vence el ${c.fechaVence}. Sabemos que el dia a dia es una locura y a veces nos pasa no te preocupes🥰, puedes realizar tus pagos en la llave @3104439749 cualquier duda que tengas estamos a un mensaje de distacia!!! Si ya pagaste omite el mensaje... ¡Te esperamos para seguir entrenando!`);
                const urlWa = `https://wa.me/${c.telefono}?text=${mensaje}`;

                contenedor.innerHTML += `
                    <div class="cliente-item" data-nombre="${c.nombre}">
                        <div style="max-width: 50%;">
                            <strong>${c.nombre}</strong><br>
                            <span class="${claseEstado}">${textoEstado}</span>
                        </div>
                        <div style="display:flex; align-items:center; flex-wrap: wrap; justify-content: flex-end; gap: 4px;">
                            <a href="${urlWa}" class="btn-wa" target="_blank">📱 Avisar</a>
                            <button class="btn-renovar" onclick="renovarMembresia(${index})">🔄 +1 M</button>
                            <button class="btn-editar" onclick="iniciarEdicion(${index})">✏️</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderizarHistorial() {
            const contenedor = document.getElementById('listaHistorial');
            contenedor.innerHTML = '';

            if (historialPagos.length === 0) {
                contenedor.innerHTML = '<p style="color:var(--text-dim)">Aún no hay registros de pagos en la nube.</p>';
                return;
            }

            historialPagos.forEach((h) => {
                contenedor.innerHTML += `
                    <div class="historial-item">
                        <span style="color:var(--accent); font-weight:bold;">💵 ${h.fechaPago}</span> - 
                        <strong>${h.nombre}</strong><br>
                        <span style="color:var(--text-dim); font-size:13px;">${h.concepto}</span>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
